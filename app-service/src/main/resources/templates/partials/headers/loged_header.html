<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><span class="text-primary">PC</span>BuilderShop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarScroll">
                <ul class="navbar-nav me-auto my-2 my-lg-0">
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center" href="#sidebarCategorias" role="button"
                            data-bs-toggle="offcanvas" aria-controls="sidebarCategorias">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                                class="bi bi-justify me-2" viewBox="0 0 16 16">
                                <path fill-rule="evenodd"
                                    d="M2 12.5a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5m0-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5m0-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5m0-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5" />
                            </svg>
                            Todas las categorías
                        </a>
                    </li>
                </ul>

                <form class="d-flex me-3" action="/search" method="GET">
                    <input name="name" class="form-control me-2" type="search" placeholder="Buscar componente (ej: RTX 4060)">
                    <button class="btn btn-outline-primary" type="submit">Buscar</button>
                </form>

                <a href="/shopping-cart" class="btn btn-light me-2 d-flex align-items-center">
                    <i class="bi bi-cart3 me-1"></i> <span class="d-none d-xl-inline">Mi Cesta</span>
                </a>

                {{#isLoggedIn}}
                <div class="dropdown">
                    <button class="btn btn-outline-light dropdown-toggle d-flex align-items-center" type="button"
                        id="userMenu" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle me-1"></i>
                        <span class="d-none d-xl-inline">Mi Cuenta</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark" aria-labelledby="userMenu">
                        <li><a class="dropdown-item" href="/profile"><i class="bi bi-person me-2"></i>Perfil</a></li>

                        {{#isAdmin}}
                        <li>
                            <a href="/admin/admin-dashboard" class="dropdown-item text-warning">
                                <i class="bi bi-shield-lock me-2"></i>Admin
                            </a>
                        </li>
                        {{/isAdmin}}

                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li>
                            <form action="/logout" method="post" id="logoutForm" style="display:none;">
                                <input type="hidden" name="_csrf" value="{{_csrf.token}}" />
                            </form>
                            <a href="javascript:void(0)" class="dropdown-item text-danger"
                                onclick="document.getElementById('logoutForm').submit();">
                                <i class="bi bi-box-arrow-right me-2"></i>Salir
                            </a>
                        </li>
                    </ul>
                </div>
                {{/isLoggedIn}}

                {{^isLoggedIn}}
                <a href="/login" class="btn btn-outline-light d-flex align-items-center">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Iniciar Sesión
                </a>
                {{/isLoggedIn}}
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="sidebarCategorias"
        aria-labelledby="offcanvasLabel">
        <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="offcanvas-title" id="offcanvasLabel">Categorías</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <div class="list-group list-group-flush">
                <a href="/search?category=CPU" class="list-group-item list-group-item-action"><i
                        class="bi bi-cpu me-2"></i>Procesadores</a>
                <a href="/search?category=GPU" class="list-group-item list-group-item-action"><i
                        class="bi bi-gpu-card me-2"></i>Tarjetas Gráficas</a>
                <a href="/search?category=Motherboard" class="list-group-item list-group-item-action"><i
                        class="bi bi-motherboard me-2"></i>Placas base</a>
                <a href="/search?category=RAM" class="list-group-item list-group-item-action"><i
                        class="bi bi-memory me-2"></i>Memoria RAM</a>
                <a href="/search?category=SSD" class="list-group-item list-group-item-action"><i
                        class="bi bi-device-hdd me-2"></i>Discos duros</a>
                <a href="/search?category=PowerSupply" class="list-group-item list-group-item-action"><i
                        class="bi bi-lightning-charge me-2"></i>Fuentes</a>
                <a href="/search?category=Cooling" class="list-group-item list-group-item-action"><i
                        class="bi bi-snow me-2"></i>Refrigeración</a>
            </div>
        </div>
    </div>
</header>
